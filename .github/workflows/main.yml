name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unzip project files
        run: unzip elite_endo_flutter.zip -d .

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd elite_endo_flutter
          flutter pub get

      - name: Build APK
        run: |
          cd elite_endo_flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: elite-endo-app
          path: elite_endo_flutter/build/app/outputs/flutter-apk/app-release.apk
